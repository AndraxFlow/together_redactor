services:
  db:
    image: postgres:16-alpine
    container_name: together_redactor_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: together_redactor
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d together_redactor"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: together_redactor_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: together_redactor
    # ports:
      # - "8000:8000"
    # volumes:
    #   - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]   # предположим, есть эндпоинт /health
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
  
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    command: >
      sh -c "while ! nc -z app 8000; do sleep 1; done; nginx -g 'daemon off;'"
    depends_on:
      - app

volumes:
  pg_data:
